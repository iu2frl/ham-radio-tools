<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading Coil Calculator</title>
  <link rel="stylesheet" href="../res/dipole_optimizer.css">
</head>
<body>
  <main class="card">
    <section class="header">
      <h1>Loading Coil Calculator</h1>
      <p class="subtitle">Calculate inductance needed to shorten an antenna element.</p>
      <nav class="top-links" aria-label="Navigation">
        <a class="tool-link" href="../index.html">Back to index</a>
      </nav>
    </section>

    <form id="coil-form" novalidate>
      <div class="grid">
        <div>
          <label for="desired-freq">Desired resonance (MHz)</label>
          <input id="desired-freq" name="desired-freq" type="text" inputmode="decimal" maxlength="12" placeholder="7.150" value="7.150">
          <div class="hint">Target frequency in MHz</div>
        </div>
        <div>
          <label for="element-type">Element type</label>
          <select id="element-type" name="element-type">
            <option value="quarter-wave">Quarter-wave</option>
            <option value="half-wave">Half-wave dipole</option>
            <option value="vertical">Vertical radiator</option>
          </select>
        </div>
      </div>

      <button type="submit">Calculate Inductance</button>
    </form>

    <div id="errors" class="errors" aria-live="polite"></div>

    <section id="result" class="result" aria-live="polite">
      <div class="sizing-results" id="coil-results"></div>
      <p class="foot">Loading coil inductance depends on desired resonance and physical element length. Higher frequencies allow smaller inductance.</p>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var form = document.getElementById("coil-form");
      var freqInput = document.getElementById("desired-freq");
      var typeInput = document.getElementById("element-type");
      var errorsBox = document.getElementById("errors");
      var resultBox = document.getElementById("result");

      function parseFrequency(raw, fieldName, errors) {
        var val = raw.trim();
        if (val === "") {
          errors.push(fieldName + " is required.");
          return null;
        }
        if (!/^\d{1,5}(\.\d{1,3})?$/.test(val)) {
          errors.push(fieldName + " must be a positive decimal (MHz).");
          return null;
        }
        var num = Number(val);
        if (!Number.isFinite(num) || num <= 0 || num > 10000) {
          errors.push(fieldName + " must be between 0.001 and 10000 MHz.");
          return null;
        }
        return num;
      }

      function showErrors(errors) {
        if (!errors.length) {
          errorsBox.style.display = "none";
          return;
        }
        var html = "<strong>Validation error</strong><ul>";
        for (var i = 0; i < errors.length; i += 1) {
          html += "<li>" + errors[i].replace(/[<>&]/g, "") + "</li>";
        }
        html += "</ul>";
        errorsBox.innerHTML = html;
        errorsBox.style.display = "block";
      }

      function showResult(freq, type) {
        var wavelength = 300 / freq;
        var quarterWave = wavelength / 4;

        var inductance;
        if (type === "quarter-wave") {
          inductance = (150.0 / freq) * 0.5;
        } else if (type === "half-wave") {
          inductance = (150.0 / freq) * 0.25;
        } else {
          inductance = (150.0 / freq) * 0.6;
        }

        var turns = Math.sqrt(inductance * 100);

        var html =
          '<div class="sizing-card"><div class="sizing-label">Full wavelength</div><div class="sizing-value">' + wavelength.toFixed(2) + ' m</div></div>' +
          '<div class="sizing-card"><div class="sizing-label">Quarter-wave length (phys)</div><div class="sizing-value">' + quarterWave.toFixed(2) + ' m</div></div>' +
          '<div class="sizing-card"><div class="sizing-label">Required inductance</div><div class="sizing-value">' + inductance.toFixed(1) + ' µH</div></div>' +
          '<div class="sizing-card"><div class="sizing-label">Estimated turns (rough)</div><div class="sizing-value">' + turns.toFixed(0) + ' turns</div></div>';

        document.getElementById("coil-results").innerHTML = html;
        resultBox.style.display = "block";
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        var errors = [];
        var freq = parseFrequency(freqInput.value, "Desired frequency", errors);

        showErrors(errors);
        if (errors.length > 0) {
          resultBox.style.display = "none";
          return;
        }

        showResult(freq, typeInput.value);
      });
    }());
  </script>
</body>
</html>
